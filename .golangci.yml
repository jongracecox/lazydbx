version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - copyloopvar
    - gocritic
    - misspell
    - nilerr
    - noctx
    - revive
    - sloglint
    - testifylint
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        # Bubble Tea models require value receivers (Elm architecture);
        # they routinely exceed hugeParam's size threshold by design.
        - hugeParam
    revive:
      rules:
        - name: package-comments
          disabled: true # covered by our own convention; noisy on internal packages
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - noctx

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jongracecox/lazydbx
